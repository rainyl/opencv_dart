name: CvNativeCore
description: |
  Native bindings for OpenCV - Core
output:
  bindings: lib/src/g/core.g.dart
  symbol-file:
    output: 'package:dartcv_core/src/g/core.yaml'
    import-path: 'package:dartcv_core/src/g/core.g.dart'
import:
  symbol-files:
    - 'package:dartcv_core/src/g/types.yaml'
# ffi-native:
#   assetId: 'package:dartcv_core/dartcv_core.dart' # Optional.
compiler-opts: "-Isrc -I../../src"
sort: true
include-unused-typedefs: true
headers:
  entry-points:
    - ../../src/core/core.h
    - ../../src/core/core_async.h
    - ../../src/core/exception.h
    - ../../src/core/svd.h
    - ../../src/core/svd_async.h
    - ../../src/core/vec.h
    - ../../src/core/version.h
    - ../../src/core/logging.h
    - ../../src/imgcodecs/imgcodecs.h
    - ../../src/imgcodecs/imgcodecs_async.h
    - ../../src/imgproc/imgproc.h
    - ../../src/imgproc/imgproc_async.h
    - ../../src/calib3d/calib3d.h
    - ../../src/calib3d/calib3d_async.h
    - ../../src/features2d/features2d.h
    - ../../src/features2d/features2d_async.h
    - ../../src/photo/photo.h
    - ../../src/photo/photo_async.h
    - ../../src/stitching/stitching.h
    - ../../src/stitching/stitching_async.h
    - ../../src/video/video.h
    - ../../src/video/video_async.h
    - ../../src/contrib/aruco.h
    - ../../src/contrib/aruco_async.h
    - ../../src/contrib/img_hash.h
    - ../../src/contrib/img_hash_async.h
    - ../../src/contrib/quality.h
    - ../../src/contrib/quality_async.h
    - ../../src/contrib/wechat_qrcode.h
    - ../../src/contrib/ximgproc.h
    - ../../src/contrib/ximgproc_async.h
    - ../../src/contrib/xobjdetect.h
    - ../../src/contrib/wechat_qrcode_async.h
    - ../../src/dnn/asyncarray.h
    - ../../src/dnn/dnn.h
    - ../../src/dnn/dnn_async.h
    - ../../src/objdetect/objdetect.h
    - ../../src/objdetect/objdetect_async.h
  include-directives:
    - ../../src/core/core.h
    - ../../src/core/core_async.h
    - ../../src/core/exception.h
    - ../../src/core/svd.h
    - ../../src/core/svd_async.h
    - ../../src/core/vec.h
    - ../../src/core/version.h
    - ../../src/core/logging.h
    - ../../src/imgcodecs/imgcodecs.h
    - ../../src/imgcodecs/imgcodecs_async.h
    - ../../src/imgproc/imgproc.h
    - ../../src/imgproc/imgproc_async.h
    - ../../src/calib3d/calib3d.h
    - ../../src/calib3d/calib3d_async.h
    - ../../src/features2d/features2d.h
    - ../../src/features2d/features2d_async.h
    - ../../src/photo/photo.h
    - ../../src/photo/photo_async.h
    - ../../src/stitching/stitching.h
    - ../../src/stitching/stitching_async.h
    - ../../src/video/video.h
    - ../../src/video/video_async.h
    - ../../src/contrib/aruco.h
    - ../../src/contrib/aruco_async.h
    - ../../src/contrib/img_hash.h
    - ../../src/contrib/img_hash_async.h
    - ../../src/contrib/quality.h
    - ../../src/contrib/quality_async.h
    - ../../src/contrib/wechat_qrcode.h
    - ../../src/contrib/ximgproc.h
    - ../../src/contrib/ximgproc_async.h
    - ../../src/contrib/xobjdetect.h
    - ../../src/contrib/wechat_qrcode_async.h
    - ../../src/dnn/asyncarray.h
    - ../../src/dnn/dnn.h
    - ../../src/dnn/dnn_async.h
    - ../../src/objdetect/objdetect.h
    - ../../src/objdetect/objdetect_async.h
functions:
  leaf:
    include:
      - "Mat_Flags"
      - "Mat_Type"
      - "Mat_CountNonZero"
      - "Mat_IsContinuous"
      - "Mat_IsSubmatrix"
      - "Mat_Rows"
      - "Mat_Cols"
      - "Mat_Channels"
      - "Mat_Step"
      - "Mat_Total"
      - "Mat_Size"
      - "Mat_ElemSize.*"
      - "Mat_Dims"
      - "Mat_Data"
      - "Mat_Get.*"
      - "Mat_Set.*"
      # - ""
      # - ""
      # - ""
      # - ""

  symbol-address:
    include:
      - ".*_Close.*"
      - ".*_close.*"
#     exclude: # If you only use exclude, then everything not excluded is generated.
#       - "dispose"

preamble: |
  // coverage:ignore-file
  // dartcv_core - OpenCV bindings for Dart language
  //    some c wrappers were from gocv: https://github.com/hybridgroup/gocv
  //    License: Apache-2.0 https://github.com/hybridgroup/gocv/blob/release/LICENSE.txt
  // Author: Rainyl
  // License: Apache-2.0
  // Date: 2024/01/28

comments:
  style: doxygen # Options - doxygen(default) / any.
  length: full # Options - brief / full(default).
