name: dartcv_videoio
description: "OpenCV4 bindings for Dart language and Flutter, using dart:ffi. The most complete OpenCV bindings for Dart! With asynchronous support now!"
version: 0.0.1-dev.0
homepage: https://github.com/rainyl/opencv_dart/pkgs/dartcv_videoio

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  ffi: ^2.1.3
  dartcv_core: ^0.0.1-dev.2

dev_dependencies:
  ffigen: ">=13.0.0 <15.0.0"
  test: ^1.25.2

topics:
  - opencv
  - image
  - ffi
  - flutter
