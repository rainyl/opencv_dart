name: CvNativeContrib
description: |
  Native bindings for OpenCV - Contrib
output:
  bindings: ../lib/src/g/contrib.g.dart
  symbol-file:
    output: "package:dartcv_contrib/src/g/contrib.yaml"
    import-path: "package:dartcv_contrib/src/g/contrib.g.dart"
# ffi-native:
#   assetId: 'package:dartcv_contrib/dartcv_contrib.dart' # Optional.
import:
  symbol-files:
    - "package:dartcv_contrib/src/g/types.yaml"
compiler-opts: "-Isrc"
sort: true
include-unused-typedefs: true
headers:
  entry-points:
    - src/aruco.h
    - src/aruco_async.h
    - src/img_hash.h
    - src/img_hash_async.h
    - src/quality.h
    - src/quality_async.h
    - src/wechat_qrcode.h
    - src/ximgproc.h
    - src/ximgproc_async.h
    - src/xobjdetect.h
    - src/wechat_qrcode_async.h
  include-directives:
    - src/aruco.h
    - src/aruco_async.h
    - src/img_hash.h
    - src/img_hash_async.h
    - src/quality.h
    - src/quality_async.h
    - src/wechat_qrcode.h
    - src/ximgproc.h
    - src/ximgproc_async.h
    - src/xobjdetect.h
    - src/wechat_qrcode_async.h

functions:
  symbol-address:
    include:
      - ".*_Close.*"
      - ".*_close.*"

preamble: |
  // coverage:ignore-file
  // dartcv_contrib - OpenCV bindings for Dart language
  //    some c wrappers were from gocv: https://github.com/hybridgroup/gocv
  //    License: Apache-2.0 https://github.com/hybridgroup/gocv/blob/release/LICENSE.txt
  // Author: Rainyl
  // License: Apache-2.0
  // Date: 2024/01/28

comments:
  style: doxygen # Options - doxygen(default) / any.
  length: full # Options - brief / full(default).
